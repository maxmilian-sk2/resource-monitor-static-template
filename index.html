        <div class="flex mt-2 rounded-xl size-11 justify-center items-center pt-1 hover:bg-gray-100/20 text-gray-500 text-gray-500  hover:text-gray-100"><p><ion-icon name="grid-outline" class="size-9"></ion-icon></p></div>
        <div class="flex mt-2 rounded-xl size-11 justify-center items-center pt-1 hover:bg-gray-100/20 text-gray-500 text-gray-500  hover:text-gray-100"><p><ion-icon name="search-outline" class="size-9"></ion-icon></p></div>

    <!-- Content wrapper, limits content to 1920px wide, centered -->

        <!-- Header (all screens) -->

                <div class="hidden lg:flex items-center justify-center lg:justify-start lg:pl-3 lg:basis-64">
                    <h1 class="text-stone-50"><ion-icon name="speedometer-outline" class="mr-1"></ion-icon>Resource Monitor</h1>
                </div>
                <nav class="flex flex-col lg:flex-row items-center justify-center lg:basis-full">
                    <a href="/index.html" class="font-bold rounded-lg px-3 py-2 text-stone-50 hover:bg-gray-100 hover:text-gray-900">
                        Home
                    </a>
                    <a href="/xyz1.hzml" class="font-bold rounded-lg px-3 py-2 text-stone-50 hover:bg-gray-100 hover:text-gray-900">
                        Item2
                    </a>
                    <a href="/xyz2.html" class="font-bold rounded-lg px-3 py-2 text-stone-50 hover:bg-gray-100 hover:text-gray-900">
                        Item3
                    </a>
                    <a href="/xyz3.html" class="font-bold rounded-lg px-3 py-2 text-stone-50 hover:bg-gray-100 hover:text-gray-900">
                        Item4
                    </a>
                </nav>
                <div class="flex items-center justify-center mb-2 lg:mb-0 lg:basis-64">
                    <div class="mx-auto flex max-w-sm items-center mt-3 lg:mt-0">
                    <div>
                        <p class="text-stone-50">User Name
                        <button class="rounded-full bg-sky-500 hover:bg-sky-700 ml-1 pl-3 pr-3 pt-1 pb-1">Log out</button></p>
                    </div>
                </div>
                </div>
            </div>
        </header>

        <!-- Screen Selector for screens "md" and narrower -->
        <div class="lg:hidden flex flex-row justify-center items-center z-30 w-full h-18 mb-5 bg-slate-950 border-b-1  border-neutral-700 shadow-lg">
            <div class="flex rounded-xl pt-1 size-11 justify-center items-center bg-gray-100/30 text-sky-500"><p><ion-icon name="desktop-outline" class="size-9"></ion-icon></p></div>
            <div class="flex rounded-xl pt-1 ml-2 size-11 justify-center items-center text-gray-500"><p><ion-icon name="desktop-outline" class="size-9"></ion-icon></p></div>
            <div class="flex rounded-xl pt-1 ml-2 size-11 justify-center items-center text-gray-500"><p><ion-icon name="desktop-outline" class="size-9"></ion-icon></p></div>
            <div class="flex rounded-xl pt-1 ml-2 size-11 justify-center items-center text-gray-500"><p><ion-icon name="pie-chart-outline" class="size-9"></ion-icon></p></div>
            <div class="flex rounded-xl pt-1 ml-2 size-11 justify-center items-center text-gray-500"><p><ion-icon name="grid-outline" class="size-9"></ion-icon></p></div>
            <div class="flex rounded-xl pt-1 ml-2 size-11 justify-center items-center text-gray-500"><p><ion-icon name="search-outline" class="size-9"></ion-icon></p></div>
        </div>

        <!-- Main content -->
        <main class="flex flex-col lg:flex-row lg:pt-24 max-w-screen">

            <!-- Grid wrapper -->
            <div class="w-full md:pl-18 lg:pl-24 xl:pr-8 2xl:pr-12 flex flex-row grid md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 place-content-around lg:place-content-start gap-6">

                <!-- Disk usage component -->
                <div class="flex flex-col justify-center items-center bg-sky-50/5 backdrop-blur-xs rounded-xl border border-neutral-700 shadow-lg p-5 rounded-xl size-80 lg:size-96">
                    <p class="text-gray-100 font-bold text-2xl mb-2">Disk Usage:</p>
                    <hr class="w-64 lg:w-80 border-t-2 border-gray-500 my-3">
                    <div>
                        <div class="flex flex-col items-center gap-4">

                            <!-- AI use disclaimer: the SVG below was created using generative AI! -->
                            <svg width="288" height="40" viewBox="0 0 288 40">
                                <!-- Gradient -->
                                <defs>
                                    <linearGradient id="diskLineGradient" x1="8" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
                                        <stop offset="10%" stop-color="#16a34a" />
                                        <stop offset="50%" stop-color="#eab308" />
                                        <stop offset="90%" stop-color="#dc2626" />
                                    </linearGradient>
                                </defs>
                                <!-- Outline -->
                                <path
                                    d="M 8 20 L 280 20"
                                    fill="none"
                                    stroke="#1e293b"
                                    stroke-width="16"
                                    stroke-linecap="round"
                                />
                                <!-- Progress -->
                                <path
                                    id="diskLine"
                                    d="M 8 20 L 280 20"
                                    fill="none"
                                    stroke="url(#diskLineGradient)"
                                    stroke-width="16"
                                    stroke-linecap="round"
                                    class="transition-all duration-500"
                                />
                            </svg>

                        </div>
                    </div>
                    <p id="diskValue" class="text-gray-100 text-2xl mt-2">0%</p>
                    <hr class="w-64 border-t border-gray-700 my-3">
                    <p class="text-gray-100 text-base mt-2"><span id="diskUsed" style="color: #16a34a;">50GiB</span> used, 150GiB free</p>
                    <p class="text-gray-100 text-base mt-2">/dev/sda1</p>
                    <p class="text-gray-100 text-base mt-2">200GiB SSD</p>
                    <script>
                        const diskValue = 25;

                        const diskLine = document.getElementById("diskLine");
                        const diskText = document.getElementById("diskValue");
                        const diskUsed = document.getElementById("diskUsed");

                        const diskLength = diskLine.getTotalLength();

                        diskLine.style.strokeDasharray = diskLength;
                        diskLine.style.strokeDashoffset = diskLength;

                        const diskOffset = diskLength * (1 - diskValue / 100);

                        diskLine.style.strokeDashoffset = diskOffset;
                        diskText.textContent = diskValue + "%";

                        let txtColor;
                        if (diskValue < 40) txtColor = "#16a34a";
                        else if (diskValue < 70) txtColor = "#eab308";
                        else txtColor = "#dc2626";
                        diskUsed.style.color = txtColor;
                    </script>
                </div>

                <!-- CPU usage component -->
                <div class="flex flex-col justify-center items-center bg-sky-50/5 backdrop-blur-xs rounded-xl border border-neutral-700 shadow-lg p-5 rounded-xl size-80 lg:size-96">
                    <p class="text-gray-100 font-bold text-2xl mb-2">CPU Usage:</p>
                    <hr class="w-64 lg:w-80 border-t-2 border-gray-500 my-3">
                    <div>

                        <div class="flex flex-col items-center gap-4">

                            <!-- AI use disclaimer: the SVG below was created using generative AI! -->
                            <svg width="256" height="128" viewBox="0 0 256 128">
                                <!-- Gradient -->
                                <defs>
                                <linearGradient id="CPUgaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="10%" stop-color="#16a34a" />
                                    <stop offset="50%" stop-color="#eab308" />
                                    <stop offset="90%" stop-color="#dc2626" />
                                </linearGradient>
                                </defs>
                                <!-- Outline -->
                                <path
                                d="M 16 128 A 112 112 0 0 1 240 128"
                                fill="none"
                                stroke="#1e293b"
                                stroke-width="16"
                                />
                                <!-- Progress -->
                                <path
                                id="CPUgauge"
                                d="M 16 128 A 112 112 0 0 1 240 128"
                                fill="none"
                                stroke="url(#CPUgaugeGradient)"
                                stroke-width="16"
                                stroke-linecap="round"
                                class="transition-all duration-500"
                                stroke-dasharray="351"
                                stroke-dashoffset="351"
                                />
                            </svg>

                        </div>
                        
                    </div>
                    <p id="CPUvalue" class="text-gray-100 text-2xl mt-2">0%</p>
                    <hr class="w-64 border-t border-gray-700 my-3">
                    <p class="text-gray-100 text-base mt-2">Intel® Xeon® E5-2680 v4 x28</p>

                    <script>
                        const CPUvalue = 75;

                        const CPUpath = document.getElementById("CPUgauge");
                        const CPUtext = document.getElementById("CPUvalue");

                        const CPUlength = CPUpath.getTotalLength();

                        CPUpath.style.strokeDasharray = CPUlength;
                        CPUpath.style.strokeDashoffset = CPUlength;

                        const CPUoffset = CPUlength * (1 - CPUvalue / 100);

                        CPUpath.style.strokeDashoffset = CPUoffset;
                        CPUtext.textContent = CPUvalue + "%";
                    </script>

                </div>

                <!-- RAM usage component -->
                <div class="flex flex-col justify-center items-center bg-sky-50/5 backdrop-blur-xs rounded-xl border border-neutral-700 shadow-lg p-5 rounded-xl size-80 lg:size-96">
                    <p class="text-gray-100 font-bold text-2xl mb-2">RAM Usage:</p>
                    <hr class="w-64 lg:w-80 border-t-2 border-gray-500 my-3">
                    <div>

                        <div class="flex flex-row items-center gap-4">

                            <!-- AI use disclaimer: the SVG below was created using generative AI! -->
                            <svg width="150" height="150" viewBox="0 0 150 150">
                                <!-- Outline -->
                                <circle
                                cx="80"
                                cy="80"
                                r="60"
                                fill="none"
                                stroke="#1e293b"
                                stroke-width="12"
                                />
                                <!-- Progress -->
                                <circle
                                id="RAMcircleGauge"
                                cx="80"
                                cy="80"
                                r="60"
                                fill="none"
                                stroke="green"
                                stroke-width="12"
                                stroke-linecap="round"
                                transform="rotate(-90 80 80)"
                                class="transition-all duration-500"
                                />
                            </svg>

                            <p class="text-gray-100"><span id="RAMUsed" style="color: #16a34a;">21.3GB</span> used<br>42.7GB free</p>

                        </div>
                        
                    </div>
                    <p id="RAMvalue" class="text-gray-100 text-2xl mt-2">0%</p>
                    <hr class="w-64 border-t border-gray-700 my-1 lg:my-3">
                    <p class="text-gray-100 text-base mt-2">64GB DDR4-2800 ECC</p>

                    <script>
                        const RAMvalue = 49;

                        const RAMcircle = document.getElementById("RAMcircleGauge");
                        const RAMtext = document.getElementById("RAMvalue");
                        const RAMusedText = document.getElementById("RAMUsed")

                        const RAMradius = 60;
                        const RAMcircumference = 2 * Math.PI * RAMradius;

                        RAMcircle.style.strokeDasharray = RAMcircumference;

                        const RAMoffset = RAMcircumference * (1 - RAMvalue / 100);
                        RAMcircle.style.strokeDashoffset = RAMoffset;

                        let RAMcolor;
                        if (RAMvalue < 40) RAMcolor = "#16a34a";
                        else if (RAMvalue < 70) RAMcolor = "#eab308";
                        else RAMcolor = "#dc2626";
                        RAMcircle.style.stroke = RAMcolor;
                        RAMusedText.style.color = RAMcolor;

                        RAMtext.textContent = RAMvalue + "%";
                    </script>

                </div>

                <!-- Item example -->
                <div class="flex justify-center items-center bg-sky-50/5 backdrop-blur-xs rounded-xl border border-neutral-700 shadow-lg p-5 rounded-xl size-80 lg:size-96">
                    <div>
                        <div class="text-xl font-medium text-gray-50">Text</div>

                    </div>
                </div>

                <!-- Item example -->
                <div class="flex justify-center items-center bg-sky-50/5 backdrop-blur-xs rounded-xl border border-neutral-700 shadow-lg p-5 rounded-xl size-80 lg:size-96">
                    <div>
                        <div class="text-xl font-medium text-gray-50">Text</div>
                        <p class="text-gray-100 ">Text text</p>
                    </div>
                </div>

            </div>
        </main>

        <!-- Footer -->
        <footer>

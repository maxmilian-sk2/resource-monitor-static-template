<!-- Static frontend prototype for https://github.com/maxmilian-sk2/resource-monitor/ -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Temporary Tailwind connector -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Users - Resource Monitor</title>
</head>

<!-- Document body -->
<body class="max-w-screen justify-center min-w-screen min-h-screen bg-slate-950 bg-[radial-gradient(circle_at_10%_80%,#1e1b4b,transparent_15%),radial-gradient(circle_at_100%_15%,#4a044e,transparent_20%)]">

    <!-- Content wrapper, limits content to 1920px wide, centered -->
    <div class="lg:flex min-w-screen min-h-screen max-w-[1920px] justify-center">

        <!-- Header (all screens) -->
         <header class="z-40 w-full max-w-[1920px] lg:fixed lg:h-16 lg:pl-4 lg:pr-4 lg:pt-2 lg:pb-2">
            <div class="flex flex-col lg:flex-row w-full bg-slate-950 lg:bg-sky-50/5 lg:backdrop-blur-xs lg:h-full lg:rounded-xl border-b-1 lg:border border-neutral-700 shadow-lg pr-1">
                <div class="hidden lg:flex items-center justify-center lg:justify-start lg:pl-3 lg:basis-64">
                    <h1 class="text-stone-50"><ion-icon name="speedometer-outline" class="mr-1"></ion-icon>Resource Monitor</h1>
                </div>
                <nav class="flex flex-col lg:flex-row items-center justify-center lg:basis-full">
                    <a href="index.html" class="font-bold rounded-full px-3 py-2 text-stone-50 hover:bg-gray-100 hover:text-gray-900">
                        Home
                    </a>
                    <a href="endpoint-management.html" class="font-bold rounded-full px-3 py-2 text-stone-50 hover:bg-gray-100 hover:text-gray-900">
                        My Endpoints
                    </a>
                    <a href="user-management.html" class="font-bold rounded-full px-3 py-2 text-sky-500 hover:bg-gray-100 hover:text-gray-900">
                        Users
                    </a>
                </nav>
                <div class="flex items-center justify-center mb-2 lg:mb-0 lg:basis-64">
                    <div class="mx-auto flex max-w-sm items-center mt-3 lg:mt-0">
                    <div>
                        <p class="text-stone-50">username
                        <a href="login.html"><button class="rounded-full bg-sky-500 hover:bg-sky-700 ml-1 pl-3 pr-3 pt-1 pb-1">Log out</button></a></p>
                    </div>
                </div>
                </div>
            </div>
        </header>

        <!-- Main content -->
        <main class="flex flex-col lg:flex-row lg:pt-24 w-full max-w-[1920px]">

            <div class="w-full lg:pl-4 lg:pr-4 lg:pt-2 lg:pb-2">

            <div class="bg-sky-50/5 backdrop-blur-xs lg:rounded-xl border border-neutral-700 shadow-lg overflow-hidden">

                <div class="flex items-center justify-between px-6 py-4 border-b border-neutral-700">
                    <p class="text-gray-100 font-bold text-xl">User Management</p>
                </div>

                <table class="w-full text-sm text-left">
                    <thead class="hidden md:table-header-group">
                        <tr class="border-b border-neutral-700 text-gray-400">
                            <th class="px-6 py-3 font-medium">Username</th>
                            <th class="px-6 py-3 font-medium">Password Hash</th>
                            <th class="px-6 py-3 font-medium">Role</th>
                            <th class="px-6 py-3 font-medium"></th>
                        </tr>
                    </thead>
                    <tbody class="block md:table-row-group">

                        <!-- User -->
                        <tr class="block md:table-row border-b border-neutral-800 px-2 py-3 md:p-0 hover:bg-sky-50/5 transition-colors">
                            <td class="flex justify-between items-center px-4 py-1.5 md:table-cell md:px-6 md:py-4 text-stone-50 font-medium">
                                <span class="text-gray-500 font-normal md:hidden">Username</span>admin
                            </td>
                            <td class="flex justify-between items-center px-4 py-1.5 md:table-cell md:px-6 md:py-4 text-gray-400 font-mono">
                                <span class="text-gray-500 font-sans md:hidden">Password Hash</span>$2b$12$eImiTXuWVxfM37uY4JANjQ...
                            </td>
                            <td class="flex justify-between items-center px-4 py-1.5 md:table-cell md:px-6 md:py-4">
                                <span class="text-gray-500 md:hidden">Role</span>
                                <span class="bg-sky-500/20 text-sky-400 text-xs font-bold px-2 py-0.5 rounded-full">admin</span>
                            </td>
                            <td class="px-4 pt-2 pb-3 md:table-cell md:px-6 md:py-4">
                                <div class="flex gap-2 justify-end">
                                    <button class="flex items-center gap-1 rounded-lg border border-neutral-600 hover:border-neutral-400 text-gray-300 hover:text-white text-xs px-2.5 py-1 transition-colors"><ion-icon name="pencil-outline"></ion-icon> Edit</button>
                                    <button class="flex items-center gap-1 rounded-lg border border-red-900 hover:border-red-600 text-red-500 hover:text-red-400 text-xs px-2.5 py-1 transition-colors"><ion-icon name="trash-outline"></ion-icon> Delete </button>
                                </div>
                            </td>
                        </tr>

                        <!-- User -->
                        <tr class="block md:table-row border-b border-neutral-800 px-2 py-3 md:p-0 hover:bg-sky-50/5 transition-colors">
                            <td class="flex justify-between items-center px-4 py-1.5 md:table-cell md:px-6 md:py-4 text-stone-50 font-medium">
                                <span class="text-gray-500 font-normal md:hidden">Username</span>jsmith
                            </td>
                            <td class="flex justify-between items-center px-4 py-1.5 md:table-cell md:px-6 md:py-4 text-gray-400 font-mono">
                                <span class="text-gray-500 font-sans md:hidden">Password Hash</span>$2b$12$Kj8mNpQzLwXvRtYsUaObCe...
                            </td>
                            <td class="flex justify-between items-center px-4 py-1.5 md:table-cell md:px-6 md:py-4">
                                <span class="text-gray-500 md:hidden">Role</span>
                                <span class="bg-gray-500/20 text-gray-400 text-xs font-bold px-2 py-0.5 rounded-full">user</span>
                            </td>
                            <td class="px-4 pt-2 pb-3 md:table-cell md:px-6 md:py-4">
                                <div class="flex gap-2 justify-end">
                                    <button class="flex items-center gap-1 rounded-lg border border-neutral-600 hover:border-neutral-400 text-gray-300 hover:text-white text-xs px-2.5 py-1 transition-colors"><ion-icon name="pencil-outline"></ion-icon> Edit</button>
                                    <button class="flex items-center gap-1 rounded-lg border border-red-900 hover:border-red-600 text-red-500 hover:text-red-400 text-xs px-2.5 py-1 transition-colors"><ion-icon name="trash-outline"></ion-icon> Delete </button>
                                </div>
                            </td>
                        </tr>


                    </tbody>
                </table>

            </div>
            </div>

            </div>
        </main>

        <!-- Footer -->
        <footer>

        </footer>

    </div>
   
    <!-- Include icon pack -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
</body>
</html>
